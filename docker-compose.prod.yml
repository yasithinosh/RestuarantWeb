services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: labella_postgres
    restart: unless-stopped
    env_file: .env.prod
    environment:
    - POSTGRES_USER=${DB_USER}
    - POSTGRES_PASSWORD=${DB_PASS}
    - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - labella-net

  # Node.js backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: labella_backend
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - labella-net

  # nginx frontend (Reverse Proxy & Static Files)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: labella_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - labella-net

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: labella_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - labella-net

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: labella_prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - labella-net

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: labella_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=$${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://labella.inovoid.me/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - labella-net

  # Monitoring: Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: labella_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - labella-net

  # Monitoring: cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: labella_cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - labella-net

networks:
  labella-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  prometheus_data:
  grafana_data:
